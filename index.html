<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="c" width="800" height="500"></canvas>
  <p id="controls-hint">W/S — Move | <kbd>P</kbd> or <kbd>Esc</kbd> — Pause</p>

  <div id="overlay" class="overlay active">

    <div class="menu-box" id="main-menu">
      <div class="menu-title">ROGUE PONG</div>
      <div class="menu-subtitle">best game ever invented #1 in all game</div>
      <div class="menu-divider"></div>
      <button class="menu-btn primary" id="btn-vs-bot">▶ vs Bot</button>
      <button class="menu-btn" id="btn-start">⇄ Local 2-Player</button>
      <button class="menu-btn" id="btn-settings-main">⚙ Settings</button>
    </div>

    <div class="menu-box hidden" id="bot-menu">
      <div class="menu-title small">VS BOT</div>
      <div class="menu-subtitle">CHOOSE DIFFICULTY</div>
      <div class="menu-divider"></div>
      <button class="menu-btn bot-easy"   id="btn-bot-easy">◎ Easy</button>
      <button class="menu-btn bot-hard" id="btn-bot-hard">◎ Hard</button>
      <button class="menu-btn bot-impossible"   id="btn-bot-impossible">◎ Impossible</button>
      <div class="menu-divider"></div>
      <button class="menu-btn" id="btn-bot-back">← Back</button>
    </div>

    <div class="menu-box hidden" id="pause-menu">
      <div class="menu-title small">PAUSED</div>
      <div class="menu-divider"></div>
      <button class="menu-btn primary" id="btn-resume">▶ Resume</button>
      <button class="menu-btn" id="btn-restart">↺ Restart</button>
      <button class="menu-btn" id="btn-settings-pause">⚙ Settings</button>
      <button class="menu-btn danger" id="btn-main-menu">✕ Main Menu</button>
    </div>

    <div class="menu-box hidden" id="settings-menu">
      <div class="menu-title small">SETTINGS</div>
      <div class="menu-divider"></div>
      <fieldset class="settings-box">
      <div class="setting-row">
        
        <label>Ball Speed</label>
        <div class="btn-group">
          <button class="opt-btn" data-setting="ballSpeed" data-value="slow">Slow</button>
          <button class="opt-btn active" data-setting="ballSpeed" data-value="normal">Normal</button>
          <button class="opt-btn" data-setting="ballSpeed" data-value="fast">Fast</button>
        </div>
      </div>
       
            <div class="setting-row">
        <label>Ball Color</label>
        <div class="btn-group color-group">
          <button class="opt-btn color-btn active" data-setting="ballColor" data-value="white" style="background-color: #fff; color: #000;" title="White">◯</button>
          <button class="opt-btn color-btn" data-setting="ballColor" data-value="cyan" style="background-color: #0ff; color: #000;" title="Cyan">◯</button>
          <button class="opt-btn color-btn" data-setting="ballColor" data-value="lime" style="background-color: #0f0; color: #000;" title="Lime">◯</button>
          <button class="opt-btn color-btn" data-setting="ballColor" data-value="magenta" style="background-color: #f0f;" title="Magenta">◯</button>
          <button class="opt-btn color-btn" data-setting="ballColor" data-value="yellow" style="background-color: #ff0; color: #000;" title="Yellow">◯</button>
          <button class="opt-btn color-btn" data-setting="ballColor" data-value="orange" style="background-color: #f80;" title="Orange">◯</button>
          <button class="opt-btn color-btn" data-setting="ballColor" data-value="pink" style="background-color: #f88;" title="Pink">◯</button>
        </div>
      </div>
      
      <div class="setting-row">
        <label>Frame Rate</label>
        <div class="btn-group">
          <button class="opt-btn" data-setting="frameRate" data-value="30">30</button>
          <button class="opt-btn active" data-setting="frameRate" data-value="60">60</button>
          <button class="opt-btn" data-setting="frameRate" data-value="120">120</button>
          <button class="opt-btn" data-setting="frameRate" data-value="unlimited">Unlimited</button>
        </div>
      </div>
      <div class="setting-row">
        <label>Paddle Size</label>
        <div class="btn-group">
          <button class="opt-btn" data-setting="paddleSize" data-value="small">Small</button>
          <button class="opt-btn active" data-setting="paddleSize" data-value="normal">Normal</button>
          <button class="opt-btn" data-setting="paddleSize" data-value="large">Large</button>
        </div>
      </div>
      <div class="setting-row">
        <label>Win Score</label>
        <div class="btn-group">
          <button class="opt-btn" data-setting="winScore" data-value="5">5</button>
          <button class="opt-btn active" data-setting="winScore" data-value="10">10</button>
          <button class="opt-btn" data-setting="winScore" data-value="20">20</button>
          <button class="opt-btn" data-setting="winScore" data-value="0">∞</button>
        </div>
      </div>
      <div class="setting-row">
        <label>Ball Trail</label>
        <div class="btn-group">
          <button class="opt-btn active" data-setting="trail" data-value="on">On</button>
          <button class="opt-btn" data-setting="trail" data-value="off">Off</button>
        </div>
      </div>
      <div class="setting-row">
        <label>Player 1 Paddle</label>
        <div class="btn-group color-group">
          <button class="opt-btn color-btn active" data-setting="leftPaddleColor" data-value="white" style="background-color: #fff; color: #000;" title="White">◯</button>
          <button class="opt-btn color-btn" data-setting="leftPaddleColor" data-value="cyan" style="background-color: #0ff; color: #000;" title="Cyan">◯</button>
          <button class="opt-btn color-btn" data-setting="leftPaddleColor" data-value="lime" style="background-color: #0f0; color: #000;" title="Lime">◯</button>
          <button class="opt-btn color-btn" data-setting="leftPaddleColor" data-value="magenta" style="background-color: #f0f;" title="Magenta">◯</button>
          <button class="opt-btn color-btn" data-setting="leftPaddleColor" data-value="yellow" style="background-color: #ff0; color: #000;" title="Yellow">◯</button>
          <button class="opt-btn color-btn" data-setting="leftPaddleColor" data-value="orange" style="background-color: #f80;" title="Orange">◯</button>
          <button class="opt-btn color-btn" data-setting="leftPaddleColor" data-value="pink" style="background-color: #f88;" title="Pink">◯</button>
        </div>
      </div>
      <div class="setting-row">
        <label>Player 2 Paddle</label>
        <div class="btn-group color-group">
          <button class="opt-btn color-btn active" data-setting="rightPaddleColor" data-value="white" style="background-color: #fff; color: #000;" title="White">◯</button>
          <button class="opt-btn color-btn" data-setting="rightPaddleColor" data-value="cyan" style="background-color: #0ff; color: #000;" title="Cyan">◯</button>
          <button class="opt-btn color-btn" data-setting="rightPaddleColor" data-value="lime" style="background-color: #0f0; color: #000;" title="Lime">◯</button>
          <button class="opt-btn color-btn" data-setting="rightPaddleColor" data-value="magenta" style="background-color: #f0f;" title="Magenta">◯</button>
          <button class="opt-btn color-btn" data-setting="rightPaddleColor" data-value="yellow" style="background-color: #ff0; color: #000;" title="Yellow">◯</button>
          <button class="opt-btn color-btn" data-setting="rightPaddleColor" data-value="orange" style="background-color: #f80;" title="Orange">◯</button>
          <button class="opt-btn color-btn" data-setting="rightPaddleColor" data-value="pink" style="background-color: #f88;" title="Pink">◯</button>
        </div>
      </div>
      <div class="setting-row">
        <label>Player 1 Up</label>
        <div class="text-group">
          <input class="keybind-input" data-binding="p1Up" value="W" maxlength="1">
        </div>
      </div>
      <div class="setting-row">
        <label>Player 1 Down</label>
        <div class="text-group">
          <input class="keybind-input" data-binding="p1Down" value="S" maxlength="1">
        </div>
      </div>
      <div class="setting-row">
        <label>Player 2 Up</label>
        <div class="text-group">
          <input class="keybind-input" data-binding="p2Up" value="ArrowUp" maxlength="1">
        </div>
      </div>
      <div class="setting-row">
        <label>Player 2 Down</label>
        <div class="text-group">
          <input class="keybind-input" data-binding="p2Down" value="ArrowDown" maxlength="1">
        </div>
      </div>
      <div class="setting-row">
        <label>Player 1 Shop</label>
        <div class="text-group">
          <input class="keybind-input" data-binding="p1Shop" value="E" maxlength="1">
        </div>
      </div>
      <div class="setting-row">
        <label>Player 1 Powerup</label>
        <div class="text-group">
          <input class="keybind-input" data-binding="p1Powerup" value="Q" maxlength="1">
        </div>
      </div>
      <div class="setting-row">
        <label>Player 2 Shop</label>
        <div class="text-group">
          <input class="keybind-input" data-binding="p2Shop" value="/" maxlength="1">
        </div>
      </div>
      <div class="setting-row">
        <label>Player 2 Powerup</label>
        <div class="text-group">
          <input class="keybind-input" data-binding="p2Powerup" value="." maxlength="1">
        </div>
      </div>

      <div class="audio-controls">
        <div class="audio-player">
          <div class="audio-track-row">
            <span class="audio-label">NOW PLAYING</span>
            <span id="music-track-label" class="audio-track-name">Track 1</span>
          </div>
          <div class="audio-transport">
            <button class="transport-btn" id="btn-music-prev">&#9664;&#9664;</button>
            <button class="transport-btn primary" id="btn-music-play">&#9654;</button>
            <button class="transport-btn" id="btn-music-next">&#9654;&#9654;</button>
          </div>
        </div>
        <div class="setting-row">
          <label>Master Vol</label>
          <div class="slider-row">
            <input type="range" id="master-volume" min="0" max="1" step="0.01" value="1">
            <span class="vol-label" id="master-volume-label">100%</span>
          </div>
        </div>
        <div class="setting-row">
          <label>Music Vol</label>
          <div class="slider-row">
            <input type="range" id="music-volume" min="0" max="1" step="0.01" value="0.5">
            <span class="vol-label" id="music-volume-label">50%</span>
          </div>
        </div>
        <div class="setting-row">
          <label>SFX Vol</label>
          <div class="slider-row">
            <input type="range" id="sfx-volume" min="0" max="1" step="0.01" value="0.5">
            <span class="vol-label" id="sfx-volume-label">50%</span>
          </div>
        </div>
      </div>
      </fieldset> 
      <div class="menu-divider"></div>
      <button class="menu-btn primary" id="btn-settings-back">← Back</button>
    </div>

    <div class="menu-box hidden" id="winner-menu">
      <div class="menu-title small" id="winner-title">YOU WIN!</div>
      <div class="winner-score" id="winner-score"></div>
      <div class="menu-divider"></div>
      <button class="menu-btn primary" id="btn-play-again">▶ Play Again</button>
      <button class="menu-btn" id="btn-winner-main">✕ Main Menu</button>
    </div>

  </div>
  <script src="mode_class.js"></script>
  <script src="game.js"></script>
</body>
</html>
